project:
  type: book
  output-dir: docs

book:
  title: "Matemáticas para la Estadística Médica con R"
  subtitle: "Bioestadística — Universidad de Granada"
  author:
    - name: "Miguel Ángel Luque Fernández"
      affiliation: "Dpto. de Estadística e Investigación Operativa, Universidad de Granada"
      email: "mluquefe@ugr.es"
      url: "https://migariane.github.io"
  date: "2026-05-21"
  date-format: "YYYY"
  description: |
    Material docence de Matemáticas para la Estadística Médica con R (Bioestadística) desarrollados por el autor en el
    Departamento de Estadística e Investigación Operativa, Unidad Docente de Bioestadística de la Universidad de Granada.
  cover-image: figures/ugr-logo.png
  favicon: figures/ugr-logo.png
  repo-url: https://github.com/migariane/MatematicaEstadisticaMedicinaR
  repo-actions: [edit, issue, source]
  sharing: [twitter, linkedin]
  downloads: [pdf]
  search: true
  page-footer:
    left: |
      Matemáticas para la Estadística Médica con R, por Miguel Ángel Luque Fernández
    right: |
      © 2026 Universidad de Granada · <a href="https://www.ugr.es">ugr.es</a>

  chapters:
    - index.qmd
    - part: "Parte I: Análisis Exploratorio de Datos"
      chapters:
        - chapters/semana01.qmd
        - chapters/semana02.qmd
    - part: "Parte II: Probabilidad y Variables Aleatorias"
      chapters:
        - chapters/semana03.qmd
        - chapters/semana04.qmd
        - chapters/semana05.qmd
    - part: "Parte III: Inferencia Estadística"
      chapters:
        - chapters/semana06.qmd
        - chapters/semana07.qmd
        - chapters/semana08.qmd
    - part: "Parte IV: Regresión Lineal"
      chapters:
        - chapters/semana09.qmd
        - chapters/semana10.qmd
    - part: "Parte V: Análisis de Datos Categóricos"
      chapters:
        - chapters/semana11.qmd
    - references.qmd
  appendices:
    - chapters/apendiceA.qmd
    - chapters/apendiceB.qmd
    - chapters/apendiceC.qmd
    - chapters/apendiceD.qmd
    - chapters/examen.qmd

bibliography: references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/apa.csl

language:
  code-tools-menu-caption: "Código"
  code-tools-show-all-code: "Mostrar todo el código"
  code-tools-hide-all-code: "Ocultar todo el código"
  code-summary: "Mostrar el código"
  crossref-lst-title: "Cuadro"
  crossref-lst-prefix: "Cuadro"
  listing-caption-title: "Cuadro"
  listing-page-title: "Lista de Cuadros de R"

crossref:
  lst-title: "Cuadro"
  lst-prefix: "Cuadro"
  chapters: true

format:
  html:
    lang: es
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    toc-title: "Contenidos"
    number-sections: true
    number-depth: 3
    html-math-method: mathjax
    code-fold: show
    code-summary: "Mostrar el código"
    code-tools:
      source: false
      toggle: true
      caption: "Código"
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    fig-align: center
    fig-width: 7
    fig-height: 5
    base-url: /CursoMatematicaEstadistica/
    include-in-header:
      text: |
        <script>
        MathJax = {
          tex: {
            macros: {
              btheta: "\\boldsymbol{\\theta}",
              bbeta: "\\boldsymbol{\\beta}",
              bmu: "\\boldsymbol{\\mu}",
              bSigma: "\\boldsymbol{\\Sigma}",
              bx: "\\mathbf{x}",
              bX: "\\mathbf{X}",
              by: "\\mathbf{y}",
              bY: "\\mathbf{Y}",
              bU: "\\mathbf{U}",
              E: "\\mathbb{E}",
              Var: ["\\operatorname{Var}"],
              Cov: ["\\operatorname{Cov}"],
              Corr: ["\\operatorname{Corr}"],
              iid: "\\stackrel{\\text{i.i.d.}}{\\sim}",
              tendD: "\\stackrel{\\mathcal{D}}{\\longrightarrow}",
              reals: "\\mathbb{R}",
              PP: "\\mathbb{P}"
            }
          }
        };
        </script>

  pdf:
    output-file: "Matematicas-Estadistica-Medica-con-R.pdf"
    lang: es
    documentclass: book
    classoption:
      - oneside
      - openany
    lof: false
    lot: false
    keep-tex: false
    number-sections: true
    number-depth: 3
    toc-depth: 3
    toc-title: "Contenidos"
    cite-method: natbib
    geometry:
      - margin=1in
    colorlinks: true
    linkcolor: "blue"
    urlcolor: "blue"
    citecolor: "blue"
    fontsize: 11pt
    linestretch: 1.15

execute:
  warning: false
  message: false
  echo: true
  cache: false
  eval: true
